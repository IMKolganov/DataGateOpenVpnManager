# Allow execution of external scripts (2 = scripts are enabled and run as the user OpenVPN is started as)
script-security 2

# Executed when a client successfully connects
client-connect /etc/openvpn/scripts/client-connect.sh

# Executed when a client disconnects
client-disconnect /etc/openvpn/scripts/client-disconnect.sh

# Executed when a client IP address is added or removed (e.g., for route management)
learn-address /etc/openvpn/scripts/learn-address.sh

# Executed during TLS handshake to verify client certificate (depth and CN provided as args)
tls-verify /etc/openvpn/scripts/tls-verify.sh
