services:
  openvpn-udp:
    build:
      context: .
      dockerfile: Dockerfile
    image: local-openvpn-test:2.7.4-net10
    pull_policy: never
    container_name: openvpn-udp-local
    restart: unless-stopped

    cap_add:
      - NET_ADMIN

    devices:
      - "/dev/net/tun:/dev/net/tun"

    networks:
      - openvpn_network

    volumes:
      - ./data/openvpn_udp:/openvpn-udp

    ports:
      - "1295:1295/udp"
      - "5009:5009"

    environment:
      ASPNETCORE_ENVIRONMENT: Production

      DATA_DIR: /openvpn-udp
      EASY_RSA_PATH: "/openvpn-udp/easy-rsa"

      PORT: "1295"
      API_PORT: 5009
      PROTO: udp

      OpenVpnManagement__Host: "localhost"
      OpenVpnManagement__Port: "5095"

      BACKEND__BASEURL: "http://localhost:5581/"

      WAN_IF: eth0
      VPN_SUBNET: "10.50.28.0"
      VPN_NETMASK: "255.255.255.0"

networks:
  openvpn_network:
    driver: bridge
